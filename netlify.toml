# ════════════════════════════════════════════════════════════
#  netlify.toml — Neo Giant (M) Sdn Bhd
#  Next.js 14 on Netlify 配置
# ════════════════════════════════════════════════════════════

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"

# Netlify 插件 — 必须安装以支持 Next.js SSR
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Serverless Functions 配置 ─────────────────────────────
[functions]
  directory         = "netlify/functions"
  node_bundler      = "esbuild"
  # Functions 超时时间（秒）— Supabase 查询可能需要 1-2 秒
  included_files    = ["src/lib/auth.ts", "src/types/index.ts"]

# ── 安全响应头 ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection          = "1; mode=block"

# /admin 路由 — 强制 noindex
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag  = "noindex, nofollow"
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"

# ── 重定向规则 ────────────────────────────────────────────
# HTTP → HTTPS 强制跳转
[[redirects]]
  from   = "http://neogiant.com.my/*"
  to     = "https://www.neogiant.com.my/:splat"
  status = 301
  force  = true

# www 规范化
[[redirects]]
  from   = "https://neogiant.com.my/*"
  to     = "https://www.neogiant.com.my/:splat"
  status = 301
  force  = true
